<section class="feedback-dialog">
  <header class="feedback-dialog__header">
    <h2>Contact us / feedback</h2>
    <button mat-icon-button type="button" aria-label="Close feedback dialog" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="feedback-dialog__form">
    <mat-form-field appearance="outline">
      <mat-label>Your name (optional)</mat-label>
      <input matInput formControlName="name" maxlength="80" autocomplete="name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Your email (optional)</mat-label>
      <input matInput formControlName="email" maxlength="320" autocomplete="email" />
      @if (form.controls.email.touched && form.controls.email.hasError('email')) {
        <mat-error>Enter a valid email.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Message 🙏</mat-label>
      <textarea
        matInput
        formControlName="message"
        rows="5"
        maxlength="4000"
        placeholder="Tell us what you think, what's broken, or what you'd love to see."
      ></textarea>
      @if (form.controls.message.touched && form.controls.message.hasError('required')) {
        <mat-error>Please write a message.</mat-error>
      }
    </mat-form-field>

    <button
      mat-flat-button
      color="primary"
      type="submit"
      class="feedback-dialog__submit"
      [disabled]="submitting()"
    >
      {{ submitting() ? 'Sending...' : 'Send message' }}
    </button>
  </form>
</section>
