# Local prod-like stack. Mirrors Fly/Neon/Upstash deploy.
# Use Aspire AppHost for normal dev loop. This file = test built images locally.
#
# Usage:
#   docker compose up --build
#   Frontend: http://localhost:8080
#   API:      http://localhost:5080

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Database=poker;Username=poker;Password=poker"
      ConnectionStrings__redis: "redis:6379"
      MediatR__LicenseKey: "${MEDIATR_LICENSE_KEY:-}"
    ports:
      - "5080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
